name: ETF-ETN-Monitor

on:
  schedule:
    - cron: '20 5 * * 1-5'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Download scripts
        run: |
          curl -fsSL "https://raw.githubusercontent.com/pros-gh/single_ETP_noti/main/etf_etn_monitor.py" -o etf_etn_monitor.py
          curl -fsSL "https://raw.githubusercontent.com/pros-gh/single_ETP_noti/main/make_config.py" -o make_config.py

      - name: Generate config.json
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
        run: python3 make_config.py

      - name: Run monitor
        run: python3 etf_etn_monitor.py
