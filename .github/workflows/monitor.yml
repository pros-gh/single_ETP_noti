name: ETF/ETN 신규상장 모니터링

on:
  schedule:
    # 평일(월~금) 한국시간 오전 8시 = UTC 23시 (전날)
    - cron: '0 23 * * 0-4'
  workflow_dispatch:   # 수동 실행 버튼

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존 라이브러리 설치
        run: pip install requests

      - name: config.json 생성 (Secrets → 파일)
        env:
          SENDER_EMAIL:   ${{ secrets.SENDER_EMAIL }}
          APP_PASSWORD:   ${{ secrets.APP_PASSWORD }}
          RECIPIENTS:     ${{ secrets.RECIPIENTS }}
        run: |
          python3 - <<'EOF'
          import json, os
          cfg = {
            "_info": "GitHub Actions에서 자동 생성",
            "searchPeriod": "today",
            "senderEmail":  os.environ["SENDER_EMAIL"],
            "appPassword":  os.environ["APP_PASSWORD"],
            "recipients":   os.environ["RECIPIENTS"].split(","),
          }
          with open("config.json", "w", encoding="utf-8") as f:
              json.dump(cfg, f, ensure_ascii=False, indent=2)
          print("config.json 생성 완료")
          EOF

      - name: 모니터링 실행
        run: python3 etf_etn_monitor.py
